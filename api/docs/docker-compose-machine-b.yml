version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/collections || exit 1"]
    # Opcional: ajustar límites de memoria/CPU según el entorno

  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongo --eval 'db.adminCommand(\"ping\")' || exit 1"]

volumes:
  qdrant_storage:
  mongo_data:

# Backups (ejemplos):
# - MongoDB (desde host o otra máquina):
#   mongodump --host <mongo-host> --port 27017 -u admin -p example --out /backups/mongo-$(date +%F)
# - Qdrant: hacer snapshot del volumen (ej. copiar volumen o usar snapshot del proveedor de disco).

# Uso:
# 1) Copiar este archivo a la máquina B.
# 2) docker compose -f docker-compose-machine-b.yml up -d
# 3) Asegurarse de que la máquina API tenga variables: QDRANT_URL=http://<B_HOST>:6333, MONGO_URL=mongodb://admin:example@<B_HOST>:27017
